<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Join Game — Word Quest</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="topbar"></div>

<div class="wrap">

  <!-- Shown while no game exists yet for this board -->
  <div class="card hidden" id="waitingCard">
    <h2 id="waitingBoardName"></h2>
    <p class="muted">This board hasn't started yet. Ask your teacher to start it — this page will update automatically.</p>

    <details class="mt">
      <summary class="muted" style="cursor:pointer;">I'm the teacher</summary>
      <div class="field mt"><label>Teacher password</label><input type="password" id="teacherStartPw" /></div>
      <button class="btn btn-teal btn-sm" id="teacherStartBtn">Start this board</button>
      <p class="muted" id="teacherStartMsg"></p>
    </details>
  </div>

  <!-- Shown once a game exists -->
  <div class="card hidden" id="nameCard">
    <h2 id="boardNameLabel"></h2>

    <div class="field"><label>Your name</label><input type="text" id="playerName" /></div>

    <div id="colorSection">
      <label>Pick your color</label>
      <div class="color-grid" id="colorGrid"></div>
      <button class="btn btn-primary mt" id="joinBtn" disabled>Join game</button>
    </div>

    <details class="mt">
      <summary class="muted" style="cursor:pointer;">I'm the teacher</summary>
      <div class="field mt"><label>Teacher password</label><input type="password" id="teacherJoinPw" /></div>
      <button class="btn btn-teal btn-sm" id="teacherJoinBtn">Join as spectator</button>
    </details>

    <p class="muted" id="joinMsg"></p>
  </div>

</div>

<script type="module" src="js/join.js"></script>
</body>
</html>
